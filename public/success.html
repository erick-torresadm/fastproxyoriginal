<!DOCTYPE html>
<html lang="pt-BR" class="scroll-smooth dark" id="html-root">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pagamento Aprovado - FastProxy</title>
    <meta name="description" content="Pagamento aprovado - FastProxy">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            50: '#f0fdf4',
                            100: '#dcfce7',
                            200: '#bbf7d0',
                            300: '#86efac',
                            400: '#4ade80',
                            500: '#22c55e',
                            600: '#16a34a',
                            700: '#15803d',
                            800: '#166534',
                            900: '#14532d',
                            950: '#052e16',
                        }
                    },
                    fontFamily: {
                        sans: ['Outfit', 'system-ui', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    }
                }
            }
        }
    </script>
    <style>
        :root {
            --bg-primary: #0a0f0a;
            --bg-secondary: rgba(15, 25, 15, 0.7);
            --bg-card: rgba(20, 30, 20, 0.95);
            --text-primary: #d4e8d4;
            --text-secondary: rgba(180, 210, 180, 0.75);
            --border-color: rgba(50, 90, 40, 0.15);
        }

        * {
            -webkit-font-smoothing: antialiased;
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg-primary);
            color: var(--text-primary);
            font-family: 'Outfit', system-ui, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .success-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 48px;
            text-align: center;
            max-width: 500px;
            width: 90%;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .check-icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #22c55e, #16a34a);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
            animation: scaleIn 0.3s ease 0.2s both;
        }

        @keyframes scaleIn {
            from { transform: scale(0); }
            to { transform: scale(1); }
        }
    </style>
</head>
<body>
    <div class="success-card">
        <div class="check-icon">
            <svg class="w-10 h-10 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"/>
            </svg>
        </div>
        
        <h1 class="text-3xl font-bold mb-4" style="color: var(--text-primary)">Pagamento Aprovado!</h1>
        <p class="text-lg mb-6" style="color: var(--text-secondary)">Obrigado pela sua compra. Em breve você receberá os detalhes do seu proxy por email.</p>
        
        <div id="order-details" class="mb-8 p-4 rounded-xl" style="background: rgba(34, 197, 94, 0.1); border: 1px solid rgba(34, 197, 94, 0.2)">
            <p class="text-sm" style="color: var(--text-secondary)">Aguarde a confirmação por email com os dados de acesso.</p>
        </div>
        
        <a href="/" class="inline-block px-8 py-3 rounded-xl bg-brand-500 text-white font-semibold hover:bg-brand-600 transition-colors">
            Voltar para Home
        </a>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const sessionId = urlParams.get('session_id');
        
        if (sessionId) {
            fetch(`/api/stripe/verify/${sessionId}`)
                .then(res => res.json())
                .then(data => {
                    if (data.success && data.paymentStatus === 'paid') {
                        document.getElementById('order-details').innerHTML = `
                            <p class="font-semibold text-brand-400 mb-2">Pedido Confirmado!</p>
                            <p class="text-sm" style="color: var(--text-secondary)">Valor: R$ ${data.amountTotal}</p>
                            <p class="text-sm" style="color: var(--text-secondary)">Email: ${data.customerEmail}</p>
                            <p class="text-sm" style="color: var(--text-secondary)">Proxies: ${data.metadata?.proxy_count || 'N/A'}</p>
                        `;
                    }
                })
                .catch(err => console.log('Erro ao verificar:', err));
        }
    </script>
</body>
</html>
