<!DOCTYPE html>
<html lang="pt-BR" class="scroll-smooth dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FastProxy - Painel Admin</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🛡️</text></svg>">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            50: '#f0fdf4',
                            100: '#dcfce7',
                            200: '#bbf7d0',
                            300: '#86efac',
                            400: '#4ade80',
                            500: '#22c55e',
                            600: '#16a34a',
                            700: '#15803d',
                            800: '#166534',
                            900: '#14532d',
                        }
                    },
                    fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'], }
                }
            }
        }
    </script>
    <style>
        :root {
            --bg-primary: #09090b;
            --bg-secondary: rgba(24, 24, 27, 0.5);
            --bg-card: rgba(24, 24, 27, 0.9);
            --text-primary: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.6);
            --text-muted: rgba(255, 255, 255, 0.4);
            --border-color: rgba(255, 255, 255, 0.08);
        }
        html.light {
            --bg-primary: #ffffff;
            --bg-secondary: #f4f4f5;
            --bg-card: #ffffff;
            --text-primary: #18181b;
            --text-secondary: #52525b;
            --text-muted: #71717a;
            --border-color: #e4e4e7;
        }
        * { -webkit-font-smoothing: antialiased; margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg-primary); color: var(--text-primary); font-family: 'Inter', sans-serif; min-height: 100vh; transition: background 0.3s, color 0.3s; }
        .gradient-text { background: linear-gradient(135deg, #4ade80, #22c55e); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .gradient-bg { background: linear-gradient(135deg, #16a34a, #22c55e); }
        .card { background: var(--bg-card); border: 1px solid var(--border-color); }
        .input-field { background: var(--bg-secondary); border: 1px solid var(--border-color); transition: all 0.3s; color: var(--text-primary); }
        .input-field:focus { border-color: #22c55e; box-shadow: 0 0 0 3px rgba(34, 197, 94, 0.2); outline: none; }
        .btn-primary { background: linear-gradient(135deg, #16a34a, #22c55e); transition: all 0.3s; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 10px 40px rgba(34, 197, 94, 0.3); }
        .spin { animation: spin 1s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        nav { background: var(--bg-card); border-bottom: 1px solid var(--border-color); }
        .text-secondary { color: var(--text-secondary); }
        .text-muted { color: var(--text-muted); }
        .bg-black\/80 { background: var(--bg-card); }
        select.input-field { color: var(--text-primary); }
        /* Theme toggle button */
        .theme-toggle { position: relative; width: 48px; height: 24px; background: var(--bg-secondary); border: 1px solid var(--border-color); border-radius: 12px; cursor: pointer; transition: all 0.3s; }
        .theme-toggle::before { content: '☀️'; position: absolute; left: 6px; top: 50%; transform: translateY(-50%); font-size: 10px; transition: all 0.3s; }
        .theme-toggle::after { content: '🌙'; position: absolute; right: 6px; top: 50%; transform: translateY(-50%); font-size: 10px; transition: all 0.3s; }
        html.light .theme-toggle::before { content: '☀️'; right: 6px; left: auto; }
        html.light .theme-toggle::after { content: '🌙'; left: 6px; right: auto; }
        /* Labels */
        label { color: var(--text-secondary); }
    </style>
</head>
<body class="bg-zinc-950">
    <!-- Navbar -->
    <nav class="fixed top-0 w-full z-50 backdrop-blur-xl">
        <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <a href="/" class="flex items-center gap-3">
                    <img id="admin-logo" src="https://i.ibb.co/SwQ6ksRy/LOGO-FAST-PROXY.png" alt="FastProxy" class="h-10">
                </a>
                <span class="text-xs px-2 py-1 rounded-full bg-green-500/20 text-green-400">Admin</span>
            </div>
            <div class="flex items-center gap-4">
                <button id="theme-toggle" class="theme-toggle" onclick="toggleTheme()" aria-label="Toggle theme"></button>
                <span id="admin-name" class="text-sm"></span>
                <button onclick="logout()" class="text-sm opacity-60 hover:opacity-100">Sair</button>
            </div>
        </div>
    </nav>

    <main class="pt-24 pb-16 px-6">
        <div class="max-w-7xl mx-auto">
            <!-- Login -->
            <div id="login-section" class="max-w-md mx-auto mt-20">
                <div class="text-center mb-8">
                    <div class="w-20 h-20 gradient-bg rounded-2xl flex items-center justify-center mx-auto mb-4">
                        <svg class="w-10 h-10 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
                    </div>
                    <h1 class="text-3xl font-bold gradient-text">Painel Admin</h1>
                    <p class="text-secondary mt-2">Gerencie seus proxies</p>
                </div>
                <form onsubmit="handleLogin(event)" class="card rounded-2xl p-8 space-y-6">
                    <div>
                        <label class="block text-sm text-secondary mb-2">Email</label>
                        <input type="email" id="login-email" required value="admin@fastproxy.com" class="input-field w-full rounded-xl px-4 py-3 text-white">
                    </div>
                    <div>
                        <label class="block text-sm text-secondary mb-2">Senha</label>
                        <input type="password" id="login-password" required value="admin123" class="input-field w-full rounded-xl px-4 py-3 text-white">
                    </div>
                    <button type="submit" id="login-btn" class="btn-primary w-full py-3 rounded-xl font-semibold text-white">Entrar</button>
                    <div id="login-error" class="hidden text-red-400 text-sm text-center p-3 rounded-xl bg-red-500/10"></div>
                </form>
            </div>

            <!-- Dashboard -->
            <div id="dashboard" class="hidden">
                <!-- Stats -->
                <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
                    <div class="card rounded-xl p-4 border-green-500/20">
                        <p class="text-secondary text-sm">Total Proxies</p>
                        <p class="text-2xl font-bold" id="stat-total">0</p>
                    </div>
                    <div class="card rounded-xl p-4 border-green-500/20">
                        <p class="text-secondary text-sm">Disponíveis</p>
                        <p class="text-2xl font-bold text-green-400" id="stat-available">0</p>
                    </div>
                    <div class="card rounded-xl p-4 border-blue-500/20">
                        <p class="text-secondary text-sm">Ativos</p>
                        <p class="text-2xl font-bold text-blue-400" id="stat-active">0</p>
                    </div>
                    <div class="card rounded-xl p-4 border-amber-500/20">
                        <p class="text-secondary text-sm">Usuários</p>
                        <p class="text-2xl font-bold text-amber-400" id="stat-users">0</p>
                    </div>
                </div>

                <!-- Tabs -->
                <div class="flex gap-2 mb-6 border-b border-white/10 pb-2 overflow-x-auto">
                    <button onclick="showTab('add')" class="tab-btn px-4 py-2 rounded-lg text-sm font-medium bg-green-500/20 text-green-400 whitespace-nowrap">
                        <i class="fas fa-plus mr-2"></i>Adicionar Proxy
                    </button>
                    <button onclick="showTab('stock')" class="tab-btn px-4 py-2 rounded-lg text-sm font-medium text-secondary whitespace-nowrap">
                        <i class="fas fa-box mr-2"></i>Estoque
                    </button>
                    <button onclick="showTab('users')" class="tab-btn px-4 py-2 rounded-lg text-sm font-medium text-secondary whitespace-nowrap">
                        <i class="fas fa-users mr-2"></i>Usuários
                    </button>
                </div>

                <!-- Add Single Proxy -->
                <section id="tab-add">
                    <div class="card rounded-2xl p-6 mb-6">
                        <h2 class="text-xl font-bold mb-4 flex items-center gap-2">
                            <i class="fas fa-plus text-green-400"></i>Adicionar Proxy Único
                        </h2>
                        <form onsubmit="addSingleProxy(event)" class="space-y-4">
                            <div>
                                <label class="block text-sm text-secondary mb-2">Proxy (formato: user:pass@ip:port)</label>
                                <input type="text" id="single-proxy" placeholder="fastproxy123:fast123@177.54.146.90:11331" class="input-field w-full rounded-xl px-4 py-3 text-white font-mono" required>
                            </div>
                            <div>
                                <label class="block text-sm text-secondary mb-2">Tier</label>
                                <select id="single-tier" class="input-field w-full rounded-xl px-4 py-3 text-white">
                                    <option value="basic">Básico</option>
                                    <option value="premium">Premium</option>
                                    <option value="master">Master</option>
                                </select>
                            </div>
                            <button type="submit" class="btn-primary w-full py-3 rounded-xl font-semibold text-white">
                                <i class="fas fa-plus mr-2"></i>Adicionar
                            </button>
                        </form>
                    </div>

                    <!-- Bulk Upload -->
                    <div class="card rounded-2xl p-6">
                        <h2 class="text-xl font-bold mb-4 flex items-center gap-2">
                            <i class="fas fa-upload text-green-400"></i>Upload em Massa
                        </h2>
                        <form onsubmit="addBulkProxy(event)" class="space-y-4">
                            <div>
                                <label class="block text-sm text-secondary mb-2">Proxies (um por linha)</label>
                                <textarea id="bulk-proxies" rows="8" placeholder="fastproxy123:fast123@177.54.146.90:11331&#10;fastproxy123:fast123@177.54.146.90:11332&#10;fastproxy123:fast123@177.54.146.90:11333" class="input-field w-full rounded-xl px-4 py-3 text-white font-mono text-sm"></textarea>
                                <p class="text-xs text-muted mt-1"><span id="bulk-count">0</span> proxies detectados</p>
                            </div>
                            <div>
                                <label class="block text-sm text-secondary mb-2">Tier</label>
                                <select id="bulk-tier" class="input-field w-full rounded-xl px-4 py-3 text-white">
                                    <option value="basic">Básico</option>
                                    <option value="premium">Premium</option>
                                    <option value="master">Master</option>
                                </select>
                            </div>
                            <button type="submit" class="btn-primary w-full py-3 rounded-xl font-semibold text-white">
                                <i class="fas fa-upload mr-2"></i>Importar Proxies
                            </button>
                        </form>
                    </div>
                </section>

                <!-- Stock -->
                <section id="tab-stock" class="hidden">
                    <div class="card rounded-2xl overflow-hidden">
                        <div class="p-4 border-b border-white/10 flex flex-wrap gap-3 items-center justify-between">
                            <div class="flex items-center gap-3">
                                <h2 class="font-bold">Proxies em Estoque</h2>
                                <label class="flex items-center gap-2 text-sm text-secondary cursor-pointer">
                                    <input type="checkbox" id="select-all-proxies" onchange="toggleSelectAll()" class="w-4 h-4 accent-green-500">
                                    Selecionar Todos
                                </label>
                            </div>
                            <div class="flex items-center gap-2">
                                <select id="bulk-action" class="input-field rounded-lg px-3 py-2 text-sm text-white">
                                    <option value="">Ação em massa...</option>
                                    <option value="delete">Excluir selecionados</option>
                                    <option value="available">Status: Disponível</option>
                                    <option value="active">Status: Ativo</option>
                                    <option value="expired">Status: Expirado</option>
                                </select>
                                <button onclick="executeBulkAction()" class="bg-green-600 hover:bg-green-500 px-4 py-2 rounded-lg text-sm text-white">Aplicar</button>
                                <button onclick="loadProxies()" class="text-green-400 hover:text-green-300"><i class="fas fa-sync"></i></button>
                            </div>
                        </div>
                        <div class="overflow-x-auto">
                            <table class="w-full">
                                <thead class="bg-white/5">
                                    <tr class="text-left text-sm text-secondary">
                                        <th class="px-4 py-3 w-10"><input type="checkbox" id="select-all-top" onchange="toggleSelectAll()" class="w-4 h-4 accent-green-500"></th>
                                        <th class="px-4 py-3">Proxy</th>
                                        <th class="px-4 py-3">Tier</th>
                                        <th class="px-4 py-3">Status</th>
                                        <th class="px-4 py-3">Usuário</th>
                                        <th class="px-4 py-3">Expira</th>
                                        <th class="px-4 py-3 text-center">Ações</th>
                                    </tr>
                                </thead>
                                <tbody id="proxies-table"></tbody>
                            </table>
                        </div>
                    </div>
                </section>

                <!-- Users -->
                <section id="tab-users" class="hidden">
                    <div class="card rounded-2xl overflow-hidden">
                        <div class="p-4 border-b border-white/10 flex justify-between items-center">
                            <h2 class="font-bold">Usuários e Proxies</h2>
                            <button onclick="loadUsers()" class="text-green-400 hover:text-green-300"><i class="fas fa-sync"></i></button>
                        </div>
                        <div class="overflow-x-auto">
                            <table class="w-full">
                                <thead class="bg-white/5">
                                    <tr class="text-left text-sm text-secondary">
                                        <th class="px-4 py-3">Usuário</th>
                                        <th class="px-4 py-3">Plano</th>
                                        <th class="px-4 py-3">Proxies</th>
                                        <th class="px-4 py-3">Status</th>
                                        <th class="px-4 py-3">Expira</th>
                                        <th class="px-4 py-3 text-center">Ações</th>
                                    </tr>
                                </thead>
                                <tbody id="users-table"></tbody>
                            </table>
                        </div>
                    </div>
                </section>
            </div>
        </div>
    </main>

    <!-- Toast -->
    <div id="toast" class="fixed bottom-6 right-6 card rounded-xl p-4 hidden">
        <p id="toast-msg" class="text-sm"></p>
    </div>

    <!-- Modal -->
    <div id="modal" class="fixed inset-0 bg-black/90 hidden items-center justify-center z-50 p-4" onclick="closeModal()">
        <div class="bg-zinc-900 border border-white/20 rounded-2xl p-6 w-full max-w-md" onclick="event.stopPropagation()">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-xl font-bold text-white" id="modal-title"></h3>
                <button onclick="closeModal()" class="text-muted hover:text-white"><i class="fas fa-times"></i></button>
            </div>
            <div id="modal-content"></div>
        </div>
    </div>

    <script>
        const API_URL = '';
        let token = localStorage.getItem('fastproxy_admin_token');

        // Theme toggle
        function toggleTheme() {
            const html = document.documentElement;
            const isDark = !html.classList.contains('light');
            const logo = document.getElementById('admin-logo');
            
            if (isDark) {
                html.classList.add('light');
                localStorage.setItem('theme', 'light');
                if (logo) logo.src = 'https://i.ibb.co/ymxkPNS0/LOGO-FAST-PROXY-black.png';
            } else {
                html.classList.remove('light');
                localStorage.setItem('theme', 'dark');
                if (logo) logo.src = 'https://i.ibb.co/SwQ6ksRy/LOGO-FAST-PROXY.png';
            }
        }

        // Init theme on load
        function initTheme() {
            const savedTheme = localStorage.getItem('theme');
            const html = document.documentElement;
            const logo = document.getElementById('admin-logo');
            
            if (savedTheme === 'light') {
                html.classList.add('light');
                if (logo) logo.src = 'https://i.ibb.co/ymxkPNS0/LOGO-FAST-PROXY-black.png';
            } else if (savedTheme === 'dark') {
                html.classList.remove('light');
            } else if (window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches) {
                html.classList.add('light');
                if (logo) logo.src = 'https://i.ibb.co/ymxkPNS0/LOGO-FAST-PROXY-black.png';
            }
        }
        initTheme();

        function showTab(tab) {
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('bg-green-500/20', 'text-green-400');
                btn.classList.add('text-secondary');
            });
            
            const clickedBtn = document.querySelector(`.tab-btn[onclick="showTab('${tab}')"]`);
            if (clickedBtn) {
                clickedBtn.classList.remove('text-secondary');
                clickedBtn.classList.add('bg-green-500/20', 'text-green-400');
            }
            
            ['add', 'stock', 'users'].forEach(t => {
                document.getElementById(`tab-${t}`).classList.add('hidden');
            });
            document.getElementById(`tab-${tab}`).classList.remove('hidden');
            
            if (tab === 'stock') loadProxies();
            if (tab === 'users') loadUsers();
        }

        async function api(endpoint, method = 'GET', body = null) {
            const headers = { 'Content-Type': 'application/json' };
            if (token) headers['Authorization'] = `Bearer ${token}`;
            const res = await fetch(`${API_URL}${endpoint}`, { method, headers, body: body ? JSON.stringify(body) : null });
            return res.json();
        }

        function showToast(msg, type = 'success') {
            const div = document.getElementById('toast');
            document.getElementById('toast-msg').textContent = msg;
            div.className = `fixed bottom-6 right-6 card rounded-xl p-4 border-${type === 'success' ? 'green' : 'red'}-500/50`;
            div.classList.remove('hidden');
            setTimeout(() => div.classList.add('hidden'), 3000);
        }

        async function handleLogin(e) {
            e.preventDefault();
            const btn = document.getElementById('login-btn');
            btn.innerHTML = '<i class="fas fa-spinner spin mr-2"></i>Entrando...';
            
            try {
                const data = await api('/api/subscription/admin/login', 'POST', {
                    email: document.getElementById('login-email').value,
                    password: document.getElementById('login-password').value
                });
                if (data.success && data.user.role === 'admin') {
                    token = data.token;
                    localStorage.setItem('fastproxy_admin_token', token);
                    document.getElementById('login-section').classList.add('hidden');
                    document.getElementById('dashboard').classList.remove('hidden');
                    document.getElementById('admin-name').textContent = data.user.name;
                    loadStats();
                } else {
                    document.getElementById('login-error').textContent = data.message || 'Credenciais inválidas';
                    document.getElementById('login-error').classList.remove('hidden');
                }
            } catch (err) {
                document.getElementById('login-error').textContent = 'Erro de conexão';
                document.getElementById('login-error').classList.remove('hidden');
            }
            btn.innerHTML = 'Entrar';
        }

        function logout() {
            token = null;
            localStorage.removeItem('fastproxy_admin_token');
            document.getElementById('login-section').classList.remove('hidden');
            document.getElementById('dashboard').classList.add('hidden');
        }

        async function loadStats() {
            try {
                const [pData, uData] = await Promise.all([
                    api('/api/subscription/admin/proxies'),
                    api('/api/subscription/admin/users')
                ]);
                const proxies = pData.data?.proxies || [];
                const users = uData.data?.users || [];
                const activeProxies = proxies.filter(p => p.is_active).length;
                const availableProxies = proxies.filter(p => !p.user_id).length;
                
                document.getElementById('stat-total').textContent = proxies.length;
                document.getElementById('stat-available').textContent = availableProxies;
                document.getElementById('stat-active').textContent = activeProxies;
                document.getElementById('stat-users').textContent = users.length;
            } catch (err) { console.error(err); }
        }

        function parseProxy(proxyStr) {
            const match = proxyStr.match(/^([^:]+):([^@]+)@(.+):(\d+)$/);
            if (!match) return null;
            return { username: match[1], password: match[2], ip: match[3], port: parseInt(match[4]) };
        }

        async function addSingleProxy(e) {
            e.preventDefault();
            const proxyStr = document.getElementById('single-proxy').value.trim();
            const tier = document.getElementById('single-tier').value;
            const proxy = parseProxy(proxyStr);
            
            if (!proxy) {
                showToast('Formato inválido. Use: user:pass@ip:port', 'error');
                return;
            }
            
            try {
                const data = await api('/api/subscription/admin/proxies', 'POST', { ...proxy, tier });
                if (data.success) {
                    showToast('Proxy adicionado!');
                    document.getElementById('single-proxy').value = '';
                    loadStats();
                    loadProxies();
                } else {
                    showToast(data.message || 'Erro', 'error');
                }
            } catch (err) { showToast('Erro de conexão', 'error'); }
        }

        async function addBulkProxy(e) {
            e.preventDefault();
            const lines = document.getElementById('bulk-proxies').value.trim().split('\n').filter(l => l.trim());
            const tier = document.getElementById('bulk-tier').value;
            const proxies = lines.map(l => parseProxy(l.trim())).filter(p => p);
            
            if (proxies.length === 0) {
                showToast('Nenhum proxy válido encontrado', 'error');
                return;
            }
            
            try {
                const data = await api('/api/subscription/admin/proxies/bulk', 'POST', { proxies, tier });
                if (data.success) {
                    showToast(`${data.data?.count || proxies.length} proxies importados!`);
                    document.getElementById('bulk-proxies').value = '';
                    document.getElementById('bulk-count').textContent = '0';
                    loadStats();
                    loadProxies();
                } else {
                    showToast(data.message || 'Erro', 'error');
                }
            } catch (err) { showToast('Erro de conexão', 'error'); }
        }

        async function loadProxies() {
            try {
                const data = await api('/api/subscription/admin/proxies');
                const proxies = data.data?.proxies || [];
                const tbody = document.getElementById('proxies-table');
                
                if (proxies.length > 0) {
                    tbody.innerHTML = proxies.map(p => `<tr class="border-t border-white/5 hover:bg-white/5">
                        <td class="px-4 py-3 w-10"><input type="checkbox" class="proxy-checkbox w-4 h-4 accent-green-500" value="${p.id}"></td>
                        <td class="px-4 py-3 font-mono text-sm">${p.username}:${p.password}@${p.ip}:${p.port}</td>
                        <td class="px-4 py-3 text-sm ${p.is_active ? 'text-green-400' : 'text-red-400'}">${p.is_active ? 'Ativo' : 'Inativo'}</td>
                        <td class="px-4 py-3 text-sm">
                            ${p.user_email ? `<div class="text-white">${p.user_email}</div>` : '<span class="text-white/30">Não vinculado</span>'}
                        </td>
                        <td class="px-4 py-3 text-sm text-secondary">
                            ${new Date(p.created_at).toLocaleDateString('pt-BR')}
                        </td>
                        <td class="px-4 py-3 text-center">
                            ${!p.user_id ? `<button onclick="allocateThisProxy('${p.id}', '${p.username}:${p.password}@${p.ip}:${p.port}')" class="text-green-400 hover:text-green-300 mr-2" title="Vincular"><i class="fas fa-link"></i></button>` : ''}
                            <button onclick="deleteProxy('${p.id}')" class="text-red-400 hover:text-red-300" title="Excluir"><i class="fas fa-trash"></i></button>
                        </td>
                    </tr>`).join('');
                } else {
                    tbody.innerHTML = '<tr><td colspan="6" class="px-4 py-8 text-center text-muted">Nenhum proxy</td></tr>';
                }
            } catch (err) { console.error(err); }
        }

        function toggleSelectAll() {
            const checkboxes = document.querySelectorAll('.proxy-checkbox');
            const selectAll = document.getElementById('select-all-proxies').checked || document.getElementById('select-all-top').checked;
            checkboxes.forEach(cb => cb.checked = selectAll);
        }

        async function executeBulkAction() {
            const action = document.getElementById('bulk-action').value;
            const selected = Array.from(document.querySelectorAll('.proxy-checkbox:checked')).map(cb => cb.value);
            
            if (selected.length === 0) {
                showToast('Selecione pelo menos um proxy', 'error');
                return;
            }
            
            if (action === 'delete') {
                if (!confirm(`Excluir ${selected.length} proxy(s)?`)) return;
                for (const id of selected) {
                    await api(`/api/proxies/${id}`, 'DELETE');
                }
                showToast(`${selected.length} proxy(s) excluído(s)`);
            } else if (['available', 'active', 'expired'].includes(action)) {
                for (const id of selected) {
                    await api(`/api/proxies/${id}`, 'PUT', { status: action });
                }
                showToast(`Status alterado para ${selected.length} proxy(s)`);
            }
            
            loadProxies();
            loadStats();
        }

        async function deleteProxy(id) {
            if (!confirm('Excluir proxy?')) return;
            try {
                const data = await api(`/api/subscription/admin/proxies/${id}`, 'DELETE');
                if (data.success) {
                    showToast('Proxy excluído');
                    loadStats();
                    loadProxies();
                } else {
                    showToast(data.message || 'Erro', 'error');
                }
            } catch (err) { showToast('Erro de conexão', 'error'); }
        }

        async function allocateThisProxy(proxyId, proxyStr) {
            try {
                const usersData = await api('/api/auth/users');
                const users = usersData.data?.users || [];
                
                if (users.length === 0) {
                    showToast('Nenhum usuário cadastrado', 'error');
                    return;
                }
                
                const userList = users.map(u => `<div class="user-option flex items-center justify-between p-3 hover:bg-white/5 rounded-lg cursor-pointer transition" onclick="selectUser('${u._id}', '${u.name}', '${u.email}', '${u.whatsapp || ''}')">
                    <div>
                        <div class="font-medium text-white">${u.name}</div>
                        <div class="text-sm text-secondary">${u.email}</div>
                        ${u.whatsapp ? `<div class="text-xs text-green-400">${u.whatsapp}</div>` : ''}
                    </div>
                    <div class="text-xs text-white/30">${u.proxyCount || 0} proxies</div>
                </div>`).join('');
                
                document.getElementById('modal').classList.remove('hidden');
                document.getElementById('modal-title').textContent = 'Vincular Proxy';
                document.getElementById('modal-content').innerHTML = `
                    <div class="space-y-4">
                        <div class="p-3 bg-green-500/10 border border-green-500/30 rounded-lg font-mono text-sm text-green-400">${proxyStr}</div>
                        <div>
                            <input type="text" id="user-search" placeholder="Buscar por nome, email ou WhatsApp..." class="input-field w-full rounded-xl px-4 py-3 text-white" oninput="filterUsers()">
                        </div>
                        <div id="user-list" class="max-h-60 overflow-y-auto space-y-1">
                            ${userList}
                        </div>
                        <div id="selected-user" class="hidden p-3 bg-green-500/10 border border-green-500/30 rounded-lg">
                            <div class="flex justify-between items-center">
                                <div>
                                    <div class="font-medium text-white" id="sel-user-name"></div>
                                    <div class="text-sm text-secondary" id="sel-user-email"></div>
                                </div>
                                <button onclick="clearUser()" class="text-secondary hover:text-white"><i class="fas fa-times"></i></button>
                            </div>
                        </div>
                        <div>
                            <label class="block text-sm text-secondary mb-2">Status</label>
                            <select id="allocate-status" class="input-field w-full rounded-xl px-4 py-3 text-white">
                                <option value="active">Ativo</option>
                                <option value="available">Disponível</option>
                                <option value="expired">Expirado</option>
                            </select>
                        </div>
                        <input type="hidden" id="allocate-user-id">
                        <button onclick="confirmAllocate('${proxyId}')" class="btn-primary w-full py-3 rounded-xl font-semibold text-white">
                            <i class="fas fa-link mr-2"></i>Vincular
                        </button>
                    </div>
                `;
            } catch (err) { showToast('Erro', 'error'); }
        }

        function filterUsers() {
            const search = document.getElementById('user-search').value.toLowerCase();
            const options = document.querySelectorAll('.user-option');
            options.forEach(opt => {
                const text = opt.innerText.toLowerCase();
                opt.classList.toggle('hidden', !text.includes(search));
            });
        }

        function selectUser(id, name, email, whatsapp) {
            document.getElementById('allocate-user-id').value = id;
            document.getElementById('sel-user-name').textContent = name;
            document.getElementById('sel-user-email').textContent = email;
            document.getElementById('user-list').classList.add('hidden');
            document.getElementById('selected-user').classList.remove('hidden');
        }

        function clearUser() {
            document.getElementById('allocate-user-id').value = '';
            document.getElementById('user-list').classList.remove('hidden');
            document.getElementById('selected-user').classList.add('hidden');
        }

        async function confirmAllocate(proxyId) {
            const userId = document.getElementById('allocate-user-id').value;
            
            if (!userId) {
                showToast('Selecione um usuário', 'error');
                return;
            }
            
            try {
                const data = await api('/api/subscription/admin/proxies/allocate', 'POST', {
                    proxyId,
                    userId
                });
                if (data.success) {
                    showToast('Proxy vinculado!');
                    closeModal();
                    loadProxies();
                    loadStats();
                } else {
                    showToast(data.message || 'Erro', 'error');
                }
            } catch (err) { showToast('Erro de conexão', 'error'); }
        }

        function closeModal() {
            document.getElementById('modal').classList.add('hidden');
        }

        async function loadUsers() {
            try {
                const data = await api('/api/subscription/admin/users');
                const users = data.data?.users || [];
                const tbody = document.getElementById('users-table');
                
                if (users.length > 0) {
                    tbody.innerHTML = users.map(u => `<tr class="border-t border-white/5 hover:bg-white/5">
                        <td class="px-4 py-3">
                            <div class="font-medium">${u.name || 'N/A'}</div>
                            <div class="text-xs opacity-50">${u.email}</div>
                        </td>
                        <td class="px-4 py-3 text-sm">${u.whatsapp || '-'}</td>
                        <td class="px-4 py-3 text-sm">${u.proxy_count || 0}</td>
                        <td class="px-4 py-3"><span class="px-2 py-1 rounded text-xs bg-green-500/20 text-green-400">Ativo</span></td>
                        <td class="px-4 py-3 text-sm opacity-50">${new Date(u.created_at).toLocaleDateString('pt-BR')}</td>
                        <td class="px-4 py-3 text-center">
                            <button onclick="allocateProxy('${u.id}', '${u.email}')" class="text-blue-400 hover:text-blue-300 mr-2"><i class="fas fa-plus"></i></button>
                            <button onclick="cancelSubscription('${u.id}', '${u.email}')" class="text-red-400 hover:text-red-300" title="Cancelar assinatura"><i class="fas fa-ban"></i></button>
                        </td>
                    </tr>`).join('');
                } else {
                    tbody.innerHTML = '<tr><td colspan="6" class="px-4 py-8 text-center text-muted">Nenhum usuário</td></tr>';
                }
            } catch (err) { console.error(err); }
        }

        function viewUserProxies(userId) {
            showToast('Funcionalidade em desenvolvimento');
        }

        async function cancelSubscription(userId, userEmail) {
            const confirmed = confirm(`Tem certeza que deseja cancelar a assinatura de ${userEmail}?\n\nClique OK para oferecer cupom de 50% de desconto ou Cancelar para cancelar sem desconto.`);
            
            if (!confirmed) {
                try {
                    await api(`/api/subscription/admin/users/${userId}/cancel`, 'POST', { applyCoupon: false });
                    showToast('Assinatura cancelada');
                    loadUsers();
                } catch (err) {
                    showToast('Erro ao cancelar', 'error');
                }
                return;
            }
            
            const modalContent = `
                <div class="space-y-4">
                    <div class="p-4 rounded-xl bg-green-500/10 border border-green-500/30">
                        <p class="text-white font-medium mb-2">Deseja aplicar um cupom de <span class="text-green-400 font-bold">50% de desconto</span>?</p>
                        <p class="text-sm text-secondary">Isso reduz o valor da próxima renovação pela metade.</p>
                    </div>
                    
                    <div class="flex gap-3">
                        <button onclick="applyCancellationCoupon('${userId}', true)" class="flex-1 py-3 rounded-xl font-semibold bg-green-600 hover:bg-green-500 text-white transition">
                            <i class="fas fa-ticket-alt mr-2"></i>Sim, aplicar 50%
                        </button>
                        <button onclick="applyCancellationCoupon('${userId}', false)" class="flex-1 py-3 rounded-xl font-semibold bg-red-600 hover:bg-red-500 text-white transition">
                            <i class="fas fa-times mr-2"></i>Cancelar direto
                        </button>
                    </div>
                    
                    <button onclick="closeModal()" class="w-full py-2 text-secondary hover:text-white transition text-sm">
                        Voltar
                    </button>
                </div>
            `;
            
            document.getElementById('modal').classList.remove('hidden');
            document.getElementById('modal').classList.add('items-center');
            document.getElementById('modal-title').textContent = 'Cancelar Assinatura';
            document.getElementById('modal-content').innerHTML = modalContent;
        }

        async function applyCancellationCoupon(userId, applyCoupon) {
            try {
                const data = await api(`/api/subscription/admin/users/${userId}/cancel`, 'POST', { 
                    applyCoupon,
                    discountPercent: applyCoupon ? 50 : 0
                });
                
                if (data.success) {
                    showToast(applyCoupon ? 'Cupom 50% aplicado!' : 'Assinatura cancelada');
                    closeModal();
                    loadUsers();
                } else {
                    showToast(data.message || 'Erro', 'error');
                }
            } catch (err) {
                showToast('Erro de conexão', 'error');
            }
        }

        function allocateProxy(userId, userEmail) {
            document.getElementById('allocate-user-id').value = userId;
            document.getElementById('sel-user-name').textContent = userEmail;
            document.getElementById('user-list').classList.add('hidden');
            document.getElementById('selected-user').classList.remove('hidden');
            loadProxies();
            showToast('Selecione um proxy disponível para vincular ao usuário');
        }

        document.getElementById('bulk-proxies').addEventListener('input', function() {
            const count = this.value.trim().split('\n').filter(l => l.trim()).length;
            document.getElementById('bulk-count').textContent = count;
        });

        // Load admin check on page load
        if (token) {
            api('/api/subscription/me').then(data => {
                if (data.success && data.user) {
                    document.getElementById('login-section').classList.add('hidden');
                    document.getElementById('dashboard').classList.remove('hidden');
                    document.getElementById('admin-name').textContent = data.user.name || data.user.email;
                    loadStats();
                }
            }).catch(() => {
                localStorage.removeItem('fastproxy_admin_token');
                token = null;
            });
        }
    </script>
</body>
</html>
